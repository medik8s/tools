# Kind cluster configuration for medik8s HA development
# Creates 3 control-plane + 3 worker nodes.
# Use with: make dev-setup KIND_HA=true
# Useful for testing SNR control-plane peer health checks.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
networking:
  podSubnet: "10.244.0.0/16"
  serviceSubnet: "10.96.0.0/16"
nodes:
  - role: control-plane
  - role: control-plane
  - role: control-plane
  - role: worker
  - role: worker
  - role: worker
